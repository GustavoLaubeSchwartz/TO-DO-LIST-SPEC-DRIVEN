<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List — SPEC-DRIVEN</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 TODO List</h1>
      <p class="subtitle">SPEC-DRIVEN Development</p>
    </header>

    <section class="form-section">
      <form id="task-form">
        <div class="form-group">
          <label for="title">Título *</label>
          <input type="text" id="title" placeholder="Nome da tarefa" maxlength="100" required>
        </div>
        <div class="form-group">
          <label for="description">Descrição</label>
          <textarea id="description" placeholder="Detalhes da tarefa (opcional)" maxlength="500"></textarea>
        </div>
        <div class="form-group">
          <label for="reminder">Lembrete</label>
          <input type="datetime-local" id="reminder">
        </div>
        <button type="submit" class="btn btn-primary">Adicionar Tarefa</button>
      </form>
    </section>

    <section class="filter-section">
      <button class="btn btn-filter active" data-filter="all">Todas</button>
      <button class="btn btn-filter" data-filter="pending">Pendentes</button>
      <button class="btn btn-filter" data-filter="completed">Concluídas</button>
    </section>

    <section class="tasks-section">
      <div id="tasks-list" class="tasks-list"></div>
      <p id="empty-message" class="empty-message">Nenhuma tarefa cadastrada. Adicione uma acima!</p>
    </section>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content">
      <p>Tem certeza que deseja remover esta tarefa?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirm-delete">Remover</button>
        <button class="btn btn-secondary" id="cancel-delete">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
