site_name: TODO List — SPEC-DRIVEN
site_description: Documentação da aplicação TODO List desenvolvida com SPEC-DRIVEN Development
site_author: Gustavo Laube Schwartz
repo_url: https://github.com/GustavoLaubeSchwartz/TO-DO-LIST-SPEC-DRIVEN
repo_name: TO-DO-LIST-SPEC-DRIVEN

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Alternar para tema escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Alternar para tema claro
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Início: index.md
  - Justificativas: justifications.md
  - Arquitetura: architecture.md
  - API: api.md
  - Guia de Uso: usage.md
  - Deploy: deploy.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
